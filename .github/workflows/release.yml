name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Version sync check
        if: github.event_name == 'push'
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$CARGO_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Build
        run: cargo build --release

      - name: Package archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="freespace-v${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C target/release freespace
          shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freespace-${{ matrix.target }}
          path: |
            freespace-*.tar.gz
            freespace-*.tar.gz.sha256

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes freespace-*.tar.gz freespace-*.tar.gz.sha256
