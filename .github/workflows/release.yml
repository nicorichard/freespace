name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Version sync check
        if: github.event_name == 'push'
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$CARGO_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Build
        run: cargo build --release

      - name: Package archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="freespace-v${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C target/release freespace
          shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freespace-${{ matrix.target }}
          path: |
            freespace-*.tar.gz
            freespace-*.tar.gz.sha256

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes freespace-*.tar.gz freespace-*.tar.gz.sha256

  update-tap:
    if: github.event_name == 'push'
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract SHA-256 hash
        id: hashes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARM64_SHA=$(awk '{print $1}' "freespace-v${VERSION}-aarch64-apple-darwin.tar.gz.sha256")
          echo "arm64=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.hashes.outputs.version }}"
          ARM64_SHA="${{ steps.hashes.outputs.arm64 }}"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/nicorichard/homebrew-tap.git tap
          cd tap

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/freespace.rb
          sed -i "/aarch64-apple-darwin/{n;s/sha256 \".*\"/sha256 \"${ARM64_SHA}\"/;}" Formula/freespace.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/freespace.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update freespace to ${VERSION}"
          git push
